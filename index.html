<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Busca Pokémon</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="containerTitulo">
        <h1 class="titulo">Buscar Pokémon</h1>
    </div>
    <div class="main">

        <div class="container1">
            <div class="container">
                <input type="text" id="nomePokemon" class="inpute" placeholder="Digite o nome do Pokémon">
                <div id="resultado"></div>

                <div>
                    <img id="imgPokemon" src="" alt="">
                </div>

                <div class="containerBtn">
                    <button id="btnBuscarHabilidade" class="btn">Buscar Habilidade</button>
                    <button id="btnBuscarPeso" class="btn">Buscar peso</button>
                    <button id="btnBuscarAltura" class="btn"> Buscar Altura</button>
                    <button id="btnBuscarImg" class="btn">Buscar Imagem</button>
                    <button id="btnTipo" class="btn">Buscar tipo Pokemon</button>
                    <button id="btnMovimento" class="btn">Buscar buscar movimento</button>

                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
